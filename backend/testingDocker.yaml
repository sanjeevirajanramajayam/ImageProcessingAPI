version: "3.8"

services:
  test-db:
    image: mariadb:10.6
    container_name: mysql-db
    environment:
      MARIADB_ROOT_PASSWORD: test
      MARIADB_DATABASE: imageprocessing
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql

  # ADD REDIS SIDE-CAR HERE
  test-cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"